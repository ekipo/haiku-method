name: Bump Plugin Version

on:
  push:
    branches:
      - main
    paths-ignore:
      - "plugin/.claude-plugin/plugin.json"
      - ".claude-plugin/marketplace.json"
      - "plugin/bin/haiku"
      - "CHANGELOG.md"
      - "website/**"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: version-bump
  cancel-in-progress: false

jobs:
  bump-version:
    runs-on: ubuntu-latest
    # Skip if commit is from bot (prevent loops)
    if: github.actor != 'github-actions[bot]'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Pull latest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Switch remote to SSH so pushes use the deploy key (bypass branch protection)
          git remote set-url origin git@github.com:gigsmart/haiku-method.git
          git pull --rebase origin main

      - name: Install Claude CLI
        if: env.CLAUDE_CODE_OAUTH_TOKEN != ''
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: npm install -g @anthropic-ai/claude-code

      - name: Determine version bump type
        id: bump-type
        env:
          BEFORE_SHA: ${{ github.event.before }}
          AFTER_SHA: ${{ github.event.after }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          # Two-pass classifier (see .github/scripts/determine-bump-type.sh):
          #   1. Conventional-commit regex over every commit in the pushed
          #      range — catches feat/fix/breaking markers in any commit,
          #      including the bodies of merge commits.
          #   2. If regex picked patch, ask Claude haiku to look at the
          #      diff stat in case a plain-English PR title is hiding a
          #      real feature or breaking change.
          BUMP_TYPE=$(.github/scripts/determine-bump-type.sh)
          echo "type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          case "$BUMP_TYPE" in
            major) echo "Detected: MAJOR (breaking change)" ;;
            minor) echo "Detected: MINOR (feature)" ;;
            patch) echo "Detected: PATCH (fix/chore/other)" ;;
          esac

      - name: Bump version
        id: bump-version
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          BUMP_TYPE="${{ steps.bump-type.outputs.type }}"
          PLUGIN_JSON="plugin/.claude-plugin/plugin.json"
          MARKETPLACE_JSON=".claude-plugin/marketplace.json"

          # Get current version
          CURRENT_VERSION=$(jq -r '.version' "$PLUGIN_JSON")
          echo "Current version: $CURRENT_VERSION"

          # Parse version components
          MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
          MINOR=$(echo "$CURRENT_VERSION" | cut -d. -f2)
          PATCH=$(echo "$CURRENT_VERSION" | cut -d. -f3)

          # Bump based on type
          case "$BUMP_TYPE" in
            major)
              NEW_VERSION="$((MAJOR + 1)).0.0"
              ;;
            minor)
              NEW_VERSION="${MAJOR}.$((MINOR + 1)).0"
              ;;
            patch)
              NEW_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
              ;;
          esac

          echo "New version: $NEW_VERSION"

          # Update plugin.json
          jq --arg version "$NEW_VERSION" '.version = $version' "$PLUGIN_JSON" > "$PLUGIN_JSON.tmp"
          mv "$PLUGIN_JSON.tmp" "$PLUGIN_JSON"

          # Update marketplace.json metadata.version
          jq --arg version "$NEW_VERSION" '.metadata.version = $version' "$MARKETPLACE_JSON" > "$MARKETPLACE_JSON.tmp"
          mv "$MARKETPLACE_JSON.tmp" "$MARKETPLACE_JSON"

          # Generate changelog (uses Claude CLI if available, falls back to commit list)
          chmod +x .github/scripts/generate-changelog.sh
          bash .github/scripts/generate-changelog.sh "." "$NEW_VERSION" "$CURRENT_VERSION"

          echo "old_version=$CURRENT_VERSION" >> $GITHUB_OUTPUT
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # haiku-api is a workspace package with `main: ./dist/index.js`;
      # haiku-ui imports from it and the MCP build bundles haiku-ui, so
      # the dist bundle has to exist before the MCP build runs. `npm ci`
      # doesn't build workspace packages automatically — do it explicitly.
      - name: Build haiku-api
        run: npm run -w haiku-api build

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Fetch Sentry DSNs from Terraform
        id: sentry
        working-directory: deploy/terraform/sentry
        run: |
          terraform init -input=false
          echo "dsn_mcp=$(terraform output -raw sentry_dsn_mcp)" >> $GITHUB_OUTPUT
          echo "dsn_spa=$(terraform output -raw sentry_dsn_spa)" >> $GITHUB_OUTPUT
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

      - name: Build MCP server bundle
        run: npm run --prefix packages/haiku build
        env:
          SENTRY_DSN_REVIEW_SPA: ${{ steps.sentry.outputs.dsn_spa }}
          HAIKU_SENTRY_DSN_MCP: ${{ steps.sentry.outputs.dsn_mcp }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_URL: https://sentry.ops.gigsmart.com
          SENTRY_ORG: gigsmart

      - name: Commit version bump
        id: commit
        run: |
          # Check if there are any changes to commit
          if git diff --quiet; then
            echo "No version changes to commit"
            echo "released=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Add version files, changelog, and rebuilt MCP server bundle
          git add plugin/.claude-plugin/plugin.json .claude-plugin/marketplace.json CHANGELOG.md plugin/bin/haiku

          # Create commit message
          COMMIT_MSG="chore(plugin): bump version ${{ steps.bump-version.outputs.old_version }} -> ${{ steps.bump-version.outputs.new_version }}"

          git commit -m "$COMMIT_MSG"

          # Clean unstaged build artifacts so rebase can proceed
          git checkout -- . 2>/dev/null || true
          git clean -fd 2>/dev/null || true

          # Pull latest and rebase, handling conflicts gracefully
          if ! git pull --rebase origin main; then
            echo "Rebase conflict detected - another workflow likely pushed first"
            echo "Aborting rebase and exiting cleanly (next push will retry)"
            git rebase --abort 2>/dev/null || true
            echo "released=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Push the rebased commit
          git push origin main
          echo "released=true" >> $GITHUB_OUTPUT

      - name: Create and push git tag
        if: steps.commit.outputs.released == 'true'
        run: |
          TAG="v${{ steps.bump-version.outputs.new_version }}"
          git tag -f "$TAG"
          git push -f origin "$TAG"

      - name: Package plugin
        if: steps.commit.outputs.released == 'true'
        run: |
          VERSION="${{ steps.bump-version.outputs.new_version }}"
          # Include CHANGELOG.md in the plugin package so /haiku:release-notes works
          cp CHANGELOG.md plugin/CHANGELOG.md
          zip -r "ai-dlc-plugin-${VERSION}.zip" plugin/ \
            -x "plugin/node_modules/*" \
            -x "plugin/*/node_modules/*" \
            -x "plugin/*/.tsbuildinfo"
          rm -f plugin/CHANGELOG.md

      - name: Extract release notes
        if: steps.commit.outputs.released == 'true'
        run: |
          VERSION="${{ steps.bump-version.outputs.new_version }}"
          # Extract changelog section for this version
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) exit
              if (index($0, "[" ver "]") > 0) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md > /tmp/release-notes.md
          # Convert relative commit links to absolute URLs for release context
          sed -i "s|../../commit/|https://github.com/${{ github.repository }}/commit/|g" /tmp/release-notes.md

      - name: Create GitHub Release
        if: steps.commit.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.bump-version.outputs.new_version }}"
          TAG="v${VERSION}"
          # Copy standalone binary for direct download (used by auto-updater)
          cp plugin/bin/haiku haiku-mcp
          # Delete existing release on retry to ensure idempotency
          gh release delete "$TAG" -y 2>/dev/null || true
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release-notes.md \
            "ai-dlc-plugin-${VERSION}.zip#AI-DLC Plugin (zip)" \
            "haiku-mcp#MCP Server Binary"
