name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Biome Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run Biome check
        run: npx biome check packages/haiku/src

      # God-file guardrail. Fails the build if any tracked .ts/.tsx
      # source file crosses the size + export-count budget without an
      # explicit allowlist entry. Prevents the next state-tools.ts
      # from silently growing to 11k lines / 101 exports before anyone
      # notices. Allowlist + thresholds documented in the script.
      - name: Check for god files
        run: node scripts/check-no-god-files.mjs

  test:
    name: MCP Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # haiku-api is a workspace package with `main: ./dist/index.js`;
      # the MCP test suite imports from it, so the dist bundle has to
      # exist before tests run. `npm ci` doesn't build workspace
      # packages automatically — do it explicitly here.
      - name: Build haiku-api
        run: npm run -w haiku-api build

      # Drift-test coverage gate. The four named drift / reconciliation
      # test files (drift-detection-gate, upstream-reconciliation,
      # drift-baseline, drift-markers) lock in the silent-establish and
      # fingerprint short-circuit contracts. A future test-glob refactor
      # or rename could silently drop coverage; this check fails loud if
      # any of the four files disappear or stop being discovered by
      # run-all.mjs. See scripts/check-ci-covers-drift-tests.mjs.
      - name: Verify drift-test coverage
        run: node scripts/check-ci-covers-drift-tests.mjs

      - name: Run MCP test suite (packages/haiku npm test)
        run: npm test --workspace packages/haiku

      # Boot smoke test: build the production MCP bundle and confirm it
      # actually launches. PR #363/#364 rollups silently shipped a 7.0.0
      # bundle with the inline-prompt-templates plugin half-broken — the
      # binary threw ENOENT at startup on the first prompt template
      # lookup. We never want to publish another binary that can't even
      # boot. The script also greps the bundle for any remaining
      # `loadTemplate(import.meta.url ...)` runtime calls (zero is
      # mandatory — every call must be inlined at build time).
      - name: MCP boot smoke test
        run: node scripts/check-mcp-boots.mjs
        working-directory: packages/haiku

