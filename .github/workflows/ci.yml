name: CI

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Biome Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Run Biome check
        run: npx biome check packages/haiku/src

  test:
    name: MCP Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # haiku-api is a workspace package with `main: ./dist/index.js`;
      # the MCP test suite imports from it, so the dist bundle has to
      # exist before tests run. `npm ci` doesn't build workspace
      # packages automatically — do it explicitly here.
      - name: Build haiku-api
        run: npm run -w haiku-api build

      # Drift-test coverage gate. The four named drift / reconciliation
      # test files (drift-detection-gate, upstream-reconciliation,
      # drift-baseline, drift-markers) lock in the silent-establish and
      # fingerprint short-circuit contracts. A future test-glob refactor
      # or rename could silently drop coverage; this check fails loud if
      # any of the four files disappear or stop being discovered by
      # run-all.mjs. See scripts/check-ci-covers-drift-tests.mjs.
      - name: Verify drift-test coverage
        run: node scripts/check-ci-covers-drift-tests.mjs

      - name: Run MCP test suite
        working-directory: packages/haiku
        run: node test/run-all.mjs

